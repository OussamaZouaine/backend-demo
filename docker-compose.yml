services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: todos
    # Host port: default 5432 for local tools; use 0 in CI for an ephemeral port (avoids clashes on shared agents).
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-todos.sql:/docker-entrypoint-initdb.d/01-init-todos.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d todos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: dockerfile
    image: oussamazouaine/backend-demo:latest
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/todos
    ports:
      - "${BACKEND_HOST_PORT:-3010}:3010"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
