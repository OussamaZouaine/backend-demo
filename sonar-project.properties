# SonarQube project settings (scanner CLI and Jenkins pick these up automatically).
# Server URL and auth token come from Jenkins: withSonarQubeEnv + Configure System → SonarQube servers.

sonar.projectKey=backend-demo
sonar.projectName=backend-demo

sonar.sources=src
sonar.sourceEncoding=UTF-8

# TypeScript analysis uses your compiler options (paths, strictness, etc.)
sonar.typescript.tsconfigPath=tsconfig.json

# Do not scan dependencies or generated artifacts
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.min.js
